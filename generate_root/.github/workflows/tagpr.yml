name: tagpr

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tagpr:
    runs-on: ubuntu-latest
    outputs:
      tagpr-tag: ${{ steps.run-tagpr.outputs.tag }}
    permissions:
      contents: write
      pull-requests: write
      packages: write
      issues: read
    timeout-minutes: 60
    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Export Go cache paths
        shell: bash
        run: |
          echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_ENV"
          echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"

      - name: Cache Go modules and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - id: run-tagpr
        name: Run tagpr
        uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1.17.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assets:
    needs: tagpr
    if: needs.tagpr.outputs.tagpr-tag != ''
    runs-on: ubuntu-latest
    environment: release
    permissions:
      actions: write
      contents: write
      packages: write
    timeout-minutes: 60
    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ needs.tagpr.outputs.tagpr-tag }}
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          # Avoid actions/cache before release builds (zizmor cache-poisoning).
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      # After GoReleaser: tagpr has already created a draft release for this tag; publish it.
      # Use `gh release edit` (by tag) instead of REST PATCH by numeric id — jq .id on 404 can yield
      # "null" or other non-numeric values and break PATCH URLs.
      - name: Publish GitHub Release (exit draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.tagpr.outputs.tagpr-tag }}
        run: |
          set -euo pipefail
          TAG="${TAG#refs/tags/}"
          TAG="${TAG//$'\n'/}"
          for _ in $(seq 1 30); do
            if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          if ! gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "::error::No GitHub release for tag ${TAG} after waiting"
            exit 1
          fi
          gh release edit "$TAG" --draft=false --repo "$GH_REPO"
          if [ "$(gh release view "$TAG" --repo "$GH_REPO" --json isDraft --jq .isDraft)" != "false" ]; then
            echo "::error::Release ${TAG} is still draft after publish step"
            exit 1
          fi

      - name: Upload checksums for Nix flake update
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: goreleaser-checksums
          path: dist/checksums.txt
          if-no-files-found: error

  update-nix-hashes:
    name: Update Nix binary hashes
    needs: [tagpr, assets]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      actions: read
      contents: write
    timeout-minutes: 30
    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download checksums from GoReleaser job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: goreleaser-checksums

      - name: Fetch binary hashes and update flake.nix
        run: |
          # Use checksums.txt from the assets job (same run as GoReleaser), not the GitHub Release API.
          # Draft releases are unreliable for gh/curl downloads before publish.
          # Convert hex SHA256 → SRI format (sha256-<base64>) required by Nix fetchurl's `hash` attribute.
          CHECKSUMS=$(cat checksums.txt)
          LINUX_HASH=$(echo "$CHECKSUMS" | awk '/{{ project_name }}-linux-amd64$/{print $1}' | xxd -r -p | base64 -w0 | sed 's/^/sha256-/')
          MACOS_HASH=$(echo "$CHECKSUMS"  | awk '/{{ project_name }}-darwin-arm64$/{print $1}' | xxd -r -p | base64 -w0 | sed 's/^/sha256-/')
          echo "linux amd64: $LINUX_HASH"
          echo "darwin arm64: $MACOS_HASH"
          # Update only the binaryHashes block (not binaryArtifacts).
          # Matches the second quoted string on each line (the value, not the key) within the block.
          awk -v linux="$LINUX_HASH" -v macos="$MACOS_HASH" '
            /binaryHashes = \{/ { in_hashes=1 }
            in_hashes && /\};/ { in_hashes=0 }
            in_hashes && /"x86_64-linux"/   { sub(/"[^"]*";/, "\"" linux "\";") }
            in_hashes && /"aarch64-darwin"/ { sub(/"[^"]*";/, "\"" macos "\";") }
            { print }
          ' flake.nix > flake.nix.tmp && mv flake.nix.tmp flake.nix

      - name: Commit updated flake.nix
        env:
          TAGPR_TAG: ${{ needs.tagpr.outputs.tagpr-tag }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          set -euo pipefail
          # ghalint requires checkout persist-credentials: false; use ssh-agent here for push only.
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key
          rm ~/.ssh/deploy_key
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git diff --staged --quiet || git commit -m "chore(nix): update binary hashes for ${TAGPR_TAG} [skip ci]"
          git push origin main
