name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

      - name: Export Go cache paths
        shell: bash
        run: |
          echo "GOMODCACHE=$(go env GOMODCACHE)" >> "$GITHUB_ENV"
          echo "GOCACHE=$(go env GOCACHE)" >> "$GITHUB_ENV"

      - name: Cache Go modules and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ env.GOMODCACHE }}
            ${{ env.GOCACHE }}
          key: ${{ runner.os }}-go-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Format Check / Lint / Test
        run: mise run ci

  # Skip Nix until nix-vendor-hash.yml commits flake.nix (same PR may run CI in parallel first).
  nix-skip-gate:
    name: Nix skip gate (Renovate vendor hash)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    outputs:
      skip_nix: ${{ steps.check.outputs.skip_nix }}
    steps:
      - name: Check out source code
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine whether to skip Nix flake check
        id: check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "skip_nix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${GITHUB_HEAD_REF}" != renovate/* ]]; then
            echo "skip_nix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"); then
            echo "skip_nix=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          has_gomod=false
          has_flake=false
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            [[ "$f" == go.mod || "$f" == go.sum ]] && has_gomod=true
            [[ "$f" == flake.nix ]] && has_flake=true
          done <<< "$files"
          if [[ "$has_gomod" == true && "$has_flake" == false ]]; then
            echo "skip_nix=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_nix=false" >> "$GITHUB_OUTPUT"
          fi

  nix:
    name: Nix flake check (${{ matrix.os }})
    needs: nix-skip-gate
    if: needs.nix-skip-gate.outputs.skip_nix != 'true'
    runs-on: ${{ matrix.os }}
    environment: ci
    permissions:
      contents: read
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@2c9db80fb984ceb1bcaa77cdda3fdf8cfba92035 # v34

      - name: Set up Cachix
        uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
        with:
          name: {{ owner }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: '-source$'

      - name: Flake check
        run: nix flake check
